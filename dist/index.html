<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f0f12; color: white; }
    .card { background: #1a1a1f; border: 1px solid #2a2a30; border-radius: 12px; }
    .stat-value { font-size: 2rem; font-weight: 600; }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-semibold">📊 Pipeline Dashboard</h1>
        <p class="text-gray-400 mt-1">Development velocity & health metrics</p>
      </div>
      <button onclick="loadData()" class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700">Refresh</button>
    </div>
    
    <!-- Stats Cards -->
    <div class="grid grid-cols-4 gap-4 mb-8" id="stats">
      <div class="card p-4">
        <div class="text-gray-400 text-sm">Total Runs</div>
        <div class="stat-value" id="total-runs">-</div>
      </div>
      <div class="card p-4">
        <div class="text-gray-400 text-sm">Total Time</div>
        <div class="stat-value" id="total-time">-</div>
      </div>
      <div class="card p-4">
        <div class="text-gray-400 text-sm">Success Rate</div>
        <div class="stat-value" id="success-rate">-</div>
      </div>
      <div class="card p-4">
        <div class="text-gray-400 text-sm">Projects</div>
        <div class="stat-value" id="project-count">-</div>
      </div>
    </div>
    
    <!-- By Project -->
    <div class="grid grid-cols-2 gap-6">
      <div class="card p-5">
        <h3 class="text-lg font-medium mb-4">By Project</h3>
        <div id="by-project" class="space-y-3"></div>
      </div>
      
      <div class="card p-5">
        <h3 class="text-lg font-medium mb-4">By Type</h3>
        <div id="by-type" class="space-y-3"></div>
      </div>
    </div>
    
    <!-- Recent Runs -->
    <div class="card p-5 mt-6">
      <h3 class="text-lg font-medium mb-4">Recent Runs</h3>
      <table class="w-full">
        <thead>
          <tr class="text-left text-gray-400 border-b border-gray-700">
            <th class="pb-2">Project</th>
            <th class="pb-2">Type</th>
            <th class="pb-2">Version</th>
            <th class="pb-2">Duration</th>
            <th class="pb-2">Status</th>
            <th class="pb-2">Date</th>
          </tr>
        </thead>
        <tbody id="recent-runs"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadData() {
      const [runsRes, summaryRes] = await Promise.all([
        fetch('/api/runs'),
        fetch('/api/summary')
      ]);
      
      const runs = await runsRes.json();
      const summary = await summaryRes.json();
      
      // Stats
      document.getElementById('total-runs').textContent = summary.total || 0;
      document.getElementById('total-time').textContent = Math.round((summary.totalTime || 0) / 3600000 * 10) / 10 + 'h';
      
      const success = Object.values(summary.byProject || {}).reduce((s: number, p: any) => s + p.success, 0);
      const failed = Object.values(summary.byProject || {}).reduce((s: number, p: any) => s + p.failed, 0);
      const rate = (summary.total > 0) ? Math.round(success / (success + failed) * 100) : 0;
      document.getElementById('success-rate').textContent = rate + '%';
      document.getElementById('project-count').textContent = Object.keys(summary.byProject || {}).length;
      
      // By Project
      const projectDiv = document.getElementById('by-project');
      projectDiv.innerHTML = Object.entries(summary.byProject || {}).map(([name, data]: [string, any]) => `
        <div class="flex justify-between items-center">
          <span>${name}</span>
          <span class="text-gray-400">${data.runs} runs (${Math.round(data.time / 60000)}m)</span>
        </div>
      `).join('') || '<p class="text-gray-500">No data</p>';
      
      // By Type
      const typeDiv = document.getElementById('by-type');
      typeDiv.innerHTML = Object.entries(summary.byType || {}).map(([type, data]: [string, any]) => `
        <div class="flex justify-between items-center">
          <span>${type}</span>
          <span class="text-gray-400">${data.runs} runs (${Math.round(data.time / 60000)}m)</span>
        </div>
      `).join('') || '<p class="text-gray-500">No data</p>';
      
      // Recent Runs
      const tbody = document.getElementById('recent-runs');
      tbody.innerHTML = (runs || []).slice(0, 10).map(r => `
        <tr class="border-b border-gray-800">
          <td class="py-2">${r.projectName || r.projectId}</td>
          <td class="py-2"><span class="text-xs px-2 py-1 rounded bg-blue-900 text-blue-300">${r.runType}</span></td>
          <td class="py-2 text-gray-400">v${r.version || '?'}</td>
          <td class="py-2 text-gray-400">${Math.round(r.durationMs / 60000)}m</td>
          <td class="py-2"><span class="${r.status === 'SUCCESS' ? 'text-green-400' : 'text-red-400'}">${r.status}</span></td>
          <td class="py-2 text-gray-400">${new Date(r.startedAt).toLocaleDateString()}</td>
        </tr>
      `).join('') || '<tr><td colspan="6" class="py-4 text-center text-gray-500">No runs yet</td></tr>';
    }
    
    loadData();
  </script>
</body>
</html>
